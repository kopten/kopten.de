name = "kopten-de-gemeinden-redirect"
main = "src/index.js"
compatibility_date = "2026-05-30"

# Routes:
#   *.kopten.de/*   — Subdomain-Redirects (Gemeinden, Special-Subs)
#   kopten.de/*     — Apex: Legacy-URL-Redirects, sonst Passthrough an Origin
#   www.kopten.de/* — Canonicalization auf Apex
routes = [
  { pattern = "*.kopten.de/*", zone_name = "kopten.de" },
  { pattern = "kopten.de/*",   zone_name = "kopten.de" },
]

workers_dev = false

[observability]
enabled = true
head_sampling_rate = 1
